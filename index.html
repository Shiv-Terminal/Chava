<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHAVA Joyería — Lo Vales</title>
  
  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* --- PREMIUM THEME VARIABLES --- */
    :root {
      --obsidian: #0C0C0E;
      --charcoal: #141418;
      --gold: #C8A96E;
      --gold-light: #DFC088;
      --gold-dim: #8A7248;
      --ivory: #F4EFE4;
      --ivory-dark: #E8E0D0;
      --blush: #C4A09A;
      --text-muted: #888888;
      --border: rgba(200, 169, 110, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      background-color: var(--obsidian);
      color: var(--ivory);
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }

    /* --- TOP BANNER (DYNAMIC) --- */
    .top-banner {
      background: var(--gold);
      color: var(--obsidian);
      text-align: center;
      padding: 8px 5%;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: none; /* Hidden by default unless CMS has content */
    }

    /* --- NAVBAR --- */
    header {
      position: sticky;
      top: 0; width: 100%;
      background: rgba(12, 12, 14, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      transition: all 0.3s ease;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.2em;
      text-decoration: none;
    }
    .cart-btn {
      background: none;
      border: none;
      color: var(--ivory);
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      transition: color 0.3s ease;
    }
    .cart-btn:hover { color: var(--gold); }
    .cart-badge {
      position: absolute;
      top: -5px; right: -8px;
      background: var(--gold);
      color: var(--obsidian);
      font-size: 0.7rem;
      font-weight: 600;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- HERO SECTION --- */
    .hero {
      height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      background: radial-gradient(circle at center, var(--charcoal) 0%, var(--obsidian) 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-size: 4rem;
      color: var(--gold);
      margin-bottom: 10px;
      letter-spacing: 0.1em;
      animation: fadeIn 1s ease-out;
    }
    .hero p {
      font-size: 1.2rem;
      color: var(--ivory-dark);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeIn 1.5s ease-out;
    }
    .hero .accent-line {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 30px auto;
    }

    /* --- CATALOG GRID --- */
    .catalog-section {
      padding: 5rem 5%;
      max-width: 1200px;
      margin: 0 auto;
      flex: 1;
    }
    .section-title {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 3rem;
      color: var(--ivory);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2.5rem;
    }
    
    /* Product Card */
    .card {
      background: var(--charcoal);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
      box-shadow: 0 15px 30px rgba(200, 169, 110, 0.1);
    }
    .card-img-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--obsidian);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s ease;
    }
    .card:hover .card-img { transform: scale(1.05); }
    .no-img { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.1em; }
    
    .card-badge {
      position: absolute;
      top: 15px; left: 15px;
      background: rgba(12, 12, 14, 0.85);
      backdrop-filter: blur(4px);
      color: var(--gold-light);
      padding: 4px 10px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .card-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .card-title {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--ivory);
    }
    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.8rem;
    }
    .card-price {
      font-size: 1.15rem;
      color: var(--gold);
      font-weight: 500;
    }
    .card-old-price {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: line-through;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--ivory-dark);
      margin-bottom: 1.5rem;
      opacity: 0.8;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .add-to-cart {
      margin-top: auto;
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .add-to-cart:hover {
      background: var(--gold);
      color: var(--obsidian);
      font-weight: 600;
    }
    .add-to-cart:disabled {
      border-color: var(--text-muted);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* --- CART SLIDE DRAWER --- */
    .cart-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .cart-overlay.active { opacity: 1; pointer-events: all; }
    
    .cart-drawer {
      position: fixed;
      top: 0; right: -450px;
      width: 100%; max-width: 400px;
      height: 100%;
      background: var(--charcoal);
      border-left: 1px solid var(--border);
      z-index: 210;
      display: flex;
      flex-direction: column;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    .cart-drawer.active { right: 0; }
    
    .cart-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-header h2 { color: var(--gold); font-size: 1.8rem; }
    .close-cart { background: none; border: none; color: var(--ivory); cursor: pointer; }
    .close-cart:hover { color: var(--gold); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .cart-item-img {
      width: 60px; height: 60px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.2rem; }
    .cart-item-price { color: var(--gold); font-size: 0.9rem; }
    .cart-qty-controls {
      display: flex; align-items: center; gap: 0.8rem;
      background: var(--obsidian);
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .qty-btn { background: none; border: none; color: var(--ivory); cursor: pointer; }
    .qty-btn:hover { color: var(--gold); }

    .cart-footer {
      padding: 1.5rem;
      background: var(--obsidian);
      border-top: 1px solid var(--border);
    }
    .cart-total {
      display: flex; justify-content: space-between;
      font-size: 1.2rem; font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .cart-total span:last-child { color: var(--gold); }

    /* --- CHECKOUT FORM --- */
    .checkout-form { display: flex; flex-direction: column; gap: 1rem; }
    .premium-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      color: var(--ivory);
      padding: 0.8rem 0;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .premium-input:focus { border-color: var(--gold); }
    .premium-input::placeholder { color: var(--text-muted); }
    
    .checkout-btn {
      background: var(--gold);
      color: var(--obsidian);
      border: none;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 0.5rem;
      transition: all 0.3s ease;
      display: flex; justify-content: center; align-items: center; gap: 0.5rem;
    }
    .checkout-btn:hover { background: var(--gold-light); transform: translateY(-2px); }
    .checkout-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

    /* --- FOOTER (SOCIAL LINKS) --- */
    .footer {
      background: var(--charcoal);
      border-top: 1px solid var(--border);
      padding: 4rem 5% 2rem;
      text-align: center;
      margin-top: 4rem;
    }
    .footer-logo { font-size: 2rem; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 1.5rem; }
    .social-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; }
    .social-link { color: var(--ivory); transition: color 0.3s, transform 0.3s; display: flex; align-items: center; justify-content: center; }
    .social-link:hover { color: var(--gold); transform: translateY(-3px); }
    .footer-bottom { font-size: 0.85rem; color: var(--text-muted); }

    /* --- UTILS --- */
    .empty-msg { text-align: center; color: var(--text-muted); padding: 2rem 0; font-style: italic; }
    .loader { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Mobile Adjustments */
    @media (max-width: 600px) {
      .hero h1 { font-size: 2.8rem; }
      .grid { grid-template-columns: 1fr; }
      .cart-drawer { max-width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

  <!-- DYNAMIC TOP BANNER -->
  <div id="top-banner" class="top-banner"></div>

  <!-- HEADER -->
  <header id="header">
    <a href="#" class="logo">CHAVA</a>
    <button class="cart-btn" onclick="openCart()">
      <i data-lucide="shopping-bag"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1 id="hero-title">Lo vales</h1>
    <div class="accent-line"></div>
    <p id="hero-subtitle">Colección Exclusiva</p>
  </section>

  <!-- CATALOG -->
  <section class="catalog-section" id="catalog">
    <h2 class="section-title serif">Nuestras Piezas</h2>
    <div class="grid" id="product-grid">
      <!-- Products will be loaded here via JS -->
      <div class="empty-msg" style="grid-column: 1/-1;">
        <i data-lucide="loader-2" class="loader" style="margin-bottom: 10px;"></i>
        <p>Cargando la colección...</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-logo serif">CHAVA</div>
    <div class="social-links" id="social-links">
      <!-- Social Icons Injected Here via CMS -->
    </div>
    <div class="footer-bottom">© 2026 CHAVA Joyería. Todos los derechos reservados.</div>
  </footer>

  <!-- CART SIDE DRAWER -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2 class="serif">Tu Bolsa</h2>
      <button class="close-cart" onclick="closeCart()"><i data-lucide="x"></i></button>
    </div>
    
    <div class="cart-items" id="cart-items-container">
      <!-- Cart items injected here -->
      <p class="empty-msg">Tu bolsa está vacía.</p>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total-price">$0.00</span>
      </div>

      <form class="checkout-form" id="checkout-form">
        <input type="text" id="c-name" class="premium-input" placeholder="Nombre completo" required>
        <input type="tel" id="c-phone" class="premium-input" placeholder="Teléfono de contacto" required>
        <input type="text" id="c-address" class="premium-input" placeholder="Dirección de envío (Opcional)">
        <input type="text" id="c-note" class="premium-input" placeholder="Nota especial (Tallas, etc.)">
        <button type="submit" class="checkout-btn" id="checkout-btn">
          Enviar Pedido <i data-lucide="arrow-right" style="width: 18px;"></i>
        </button>
      </form>
    </div>
  </aside>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    const API_URL = "https://Shivale.pythonanywhere.com";
    
    let catalog = [];
    let cart = [];

    // DOM Elements
    const gridEl = document.getElementById('product-grid');
    const cartOverlay = document.getElementById('cart-overlay');
    const cartDrawer = document.getElementById('cart-drawer');
    const cartCountEl = document.getElementById('cart-count');
    const cartItemsEl = document.getElementById('cart-items-container');
    const cartTotalEl = document.getElementById('cart-total-price');
    const checkoutForm = document.getElementById('checkout-form');
    const checkoutBtn = document.getElementById('checkout-btn');

    // --- INITIALIZE SITE DATA ---
    async function loadSiteData() {
      // 1. Fetch CMS Content
      try {
        const conRes = await fetch(API_URL + '/content');
        if (conRes.ok) {
          const contentData = await conRes.json();
          applyContent(contentData);
        }
      } catch(e) { console.warn("No custom content available"); }

      // 2. Fetch Catalog
      try {
        const catRes = await fetch(API_URL + '/catalog');
        if (catRes.ok) {
          const data = await catRes.json();
          // Hide items marked as not visible in Admin Panel
          catalog = data.filter(item => item.visible !== false);
          renderCatalog();
        } else {
          showError("Error al cargar la colección.");
        }
      } catch (error) {
        showError("No se pudo conectar con el servidor.");
      }
    }

    // Apply CMS text and social links
    function applyContent(data) {
      if (data.heroTitle) document.getElementById('hero-title').innerText = data.heroTitle;
      if (data.heroSubtitle) document.getElementById('hero-subtitle').innerText = data.heroSubtitle;
      
      const banner = document.getElementById('top-banner');
      if (data.banner) {
        banner.innerText = data.banner;
        banner.style.display = 'block';
      }

      // Build Social Links
      const socialContainer = document.getElementById('social-links');
      let socialHTML = '';
      if (data.whatsapp) {
        const cleanPhone = data.whatsapp.replace(/\D/g, '');
        socialHTML += `<a href="https://wa.me/${cleanPhone}" target="_blank" class="social-link"><i data-lucide="message-circle"></i></a>`;
      }
      if (data.instagram) {
        const cleanIg = data.instagram.replace('@', '');
        socialHTML += `<a href="https://instagram.com/${cleanIg}" target="_blank" class="social-link"><i data-lucide="instagram"></i></a>`;
      }
      if (data.facebook) {
        socialHTML += `<a href="${data.facebook}" target="_blank" class="social-link"><i data-lucide="facebook"></i></a>`;
      }
      if (data.tiktok) {
        // Fallback robust SVG for TikTok if Lucide version misses it
        socialHTML += `<a href="${data.tiktok}" target="_blank" class="social-link"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg></a>`;
      }
      socialContainer.innerHTML = socialHTML;
      lucide.createIcons();
    }

    function renderCatalog() {
      if (catalog.length === 0) {
        gridEl.innerHTML = `<p class="empty-msg" style="grid-column: 1/-1;">Por el momento no hay piezas disponibles.</p>`;
        return;
      }

      gridEl.innerHTML = catalog.map(item => `
        <article class="card">
          <div class="card-img-container">
            ${item.image 
              ? `<img src="${item.image}" alt="${item.name}" class="card-img" loading="lazy">` 
              : `<span class="no-img">CHAVA</span>`
            }
            ${item.category && item.category !== 'Otros' ? `<span class="card-badge">${item.category}</span>` : ''}
          </div>
          <div class="card-body">
            <h3 class="card-title serif">${item.name}</h3>
            
            <div class="price-row">
                <span class="card-price">$${parseFloat(item.price).toLocaleString('es-MX', {minimumFractionDigits: 2})}</span>
                ${item.oldPrice ? `<span class="card-old-price">$${parseFloat(item.oldPrice).toLocaleString('es-MX', {minimumFractionDigits: 2})}</span>` : ''}
            </div>

            ${item.description ? `<p class="card-desc">${item.description}</p>` : ''}
            
            <button class="add-to-cart" onclick="addToCart('${item.id}')" ${item.stock <= 0 ? 'disabled' : ''}>
              ${item.stock <= 0 ? 'Agotado' : 'Agregar a la Bolsa'}
            </button>
          </div>
        </article>
      `).join('');
    }

    function showError(msg) {
      gridEl.innerHTML = `<p class="empty-msg" style="grid-column: 1/-1; color: var(--blush);">${msg}</p>`;
    }

    // --- CART LOGIC ---
    function addToCart(id) {
      const product = catalog.find(p => p.id === id);
      if (!product || product.stock <= 0) return;

      const existingItem = cart.find(i => i.id === id);
      if (existingItem) {
        if (existingItem.qty < product.stock) {
          existingItem.qty += 1;
        } else {
          alert("Límite de inventario alcanzado para esta pieza.");
          return;
        }
      } else {
        cart.push({ ...product, qty: 1 });
      }
      
      updateCartUI();
      openCart();
    }

    function updateQty(id, delta) {
      const item = cart.find(i => i.id === id);
      if (!item) return;

      item.qty += delta;
      
      if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== id);
      } else {
        const product = catalog.find(p => p.id === id);
        if (item.qty > product.stock) item.qty = product.stock;
      }
      
      updateCartUI();
    }

    function updateCartUI() {
      // Update Badge
      const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
      cartCountEl.innerText = totalItems;

      // Update Total Price
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      cartTotalEl.innerText = `$${totalPrice.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;

      // Render Items
      if (cart.length === 0) {
        cartItemsEl.innerHTML = `<p class="empty-msg">Tu bolsa está vacía.</p>`;
        checkoutBtn.disabled = true;
      } else {
        checkoutBtn.disabled = false;
        cartItemsEl.innerHTML = cart.map(item => `
          <div class="cart-item">
            ${item.image 
              ? `<img src="${item.image}" alt="${item.name}" class="cart-item-img">`
              : `<div class="cart-item-img" style="background:var(--obsidian); display:flex; align-items:center; justify-content:center;"><span style="font-size:10px; color:var(--gold);">CHAVA</span></div>`
            }
            <div class="cart-item-info">
              <h4 class="cart-item-title serif">${item.name}</h4>
              <p class="cart-item-price">$${parseFloat(item.price).toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
            </div>
            <div class="cart-qty-controls">
              <button class="qty-btn" onclick="updateQty('${item.id}', -1)"><i data-lucide="minus" style="width:14px;"></i></button>
              <span style="font-size: 0.9rem;">${item.qty}</span>
              <button class="qty-btn" onclick="updateQty('${item.id}', 1)"><i data-lucide="plus" style="width:14px;"></i></button>
            </div>
          </div>
        `).join('');
        lucide.createIcons();
      }
    }

    // --- UI CONTROLS ---
    function openCart() {
      cartOverlay.classList.add('active');
      cartDrawer.classList.add('active');
    }
    function closeCart() {
      cartOverlay.classList.remove('active');
      cartDrawer.classList.remove('active');
    }

    // --- CHECKOUT SUBMISSION ---
    checkoutForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (cart.length === 0) return;

      const originalBtnText = checkoutBtn.innerHTML;
      checkoutBtn.innerHTML = '<i data-lucide="loader-2" class="loader"></i> Enviando...';
      checkoutBtn.disabled = true;
      lucide.createIcons();

      // Format items for POS Inbox
      const itemsString = cart.map(i => `${i.qty}x ${i.name}`).join(' + ');
      const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

      const payload = {
        name: document.getElementById('c-name').value,
        phone: document.getElementById('c-phone').value,
        address: document.getElementById('c-address').value,
        message: document.getElementById('c-note').value,
        item: itemsString, 
        total: totalPrice
      };

      try {
        const response = await fetch(API_URL + '/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert("¡Pedido enviado con éxito! Tu pedido ha sido recibido en nuestro sistema. Nos comunicaremos contigo pronto.");
          cart = [];
          updateCartUI();
          checkoutForm.reset();
          closeCart();
        } else {
          alert("Hubo un problema al procesar tu pedido. Intenta de nuevo.");
        }
      } catch (error) {
        alert("Error de conexión con el servidor. Revisa tu internet.");
      } finally {
        checkoutBtn.innerHTML = originalBtnText;
        checkoutBtn.disabled = (cart.length === 0);
      }
    });

    // Start App Sequence
    loadSiteData();

  </script>
</body>
</html>
